<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cricket Team Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .team-card {
            transition: all 0.2s ease;
        }

        .team-card:hover {
            transform: translateY(-2px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        .player-row:nth-child(even) {
            background-color: rgba(30, 41, 59, 0.5);
        }

        .selected-row {
            background-color: rgba(59, 130, 246, 0.2) !important;
            border-left: 4px solid #3b82f6;
        }

        .badge-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .sticky-header {
            backdrop-filter: blur(12px);
            background-color: rgba(15, 23, 42, 0.9);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top Sticky Dashboard -->
    <header class="sticky top-0 z-50 border-b border-slate-700 sticky-header shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                        <i class="fas fa-cricket-bat-ball text-blue-500"></i>
                        Squad Builder
                    </h1>
                    <p class="text-slate-400 text-xs">Rule: 11 Players, 10 Teams (1 Team with 2 players)</p>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 items-center">
                    <div class="bg-slate-800/50 p-2 rounded-lg border border-slate-700">
                        <p class="text-[10px] uppercase text-slate-500 font-bold">Budget Left</p>
                        <p id="budget-left" class="text-lg font-mono font-bold text-blue-400">100 / 100</p>
                    </div>
                    <div class="bg-slate-800/50 p-2 rounded-lg border border-slate-700">
                        <p class="text-[10px] uppercase text-slate-500 font-bold">Players</p>
                        <p id="player-count" class="text-lg font-mono font-bold text-emerald-400">0 / 11</p>
                    </div>
                    <div class="bg-slate-800/50 p-2 rounded-lg border border-slate-700">
                        <p class="text-[10px] uppercase text-slate-500 font-bold">Teams Covered</p>
                        <p id="team-count" class="text-lg font-mono font-bold text-amber-400">0 / 10</p>
                    </div>
                    <button id="view-squad-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-users"></i>
                        <span class="hidden sm:inline">Squad</span>
                    </button>
                </div>
            </div>
            
            <!-- Progress Bar -->
            <div class="w-full bg-slate-800 h-1 mt-4 rounded-full overflow-hidden">
                <div id="budget-progress" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar: Squad List (Hidden on Mobile, Visible in Modal/Side) -->
        <aside id="squad-sidebar" class="lg:col-span-4 space-y-4">
            <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-6 sticky top-40">
                <h2 class="text-xl font-bold mb-4 flex items-center justify-between">
                    Selected Squad
                    <span id="squad-status" class="text-[10px] bg-slate-700 px-2 py-1 rounded text-slate-300">Incomplete</span>
                </h2>
                <div id="selected-list" class="space-y-3 min-h-[400px] max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                    <p class="text-slate-500 text-center py-10 italic">No players selected yet...</p>
                </div>
                
                <div id="validation-errors" class="mt-4 p-3 bg-red-900/20 border border-red-500/50 rounded-lg hidden">
                    <p class="text-red-400 text-xs"></p>
                </div>

                <button id="submit-btn" disabled class="w-full mt-6 py-3 rounded-lg bg-slate-700 text-slate-500 font-bold cursor-not-allowed transition-all">
                    FINALISE SQUAD
                </button>
            </div>
        </aside>

        <!-- Main Content: Player Database -->
        <section class="lg:col-span-8">
            <!-- Search and Filter -->
            <div class="flex flex-wrap gap-4 mb-6">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="player-search" placeholder="Search name, team or price..." class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <select id="team-filter" class="bg-slate-800 border border-slate-700 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">All Teams</option>
                    <option value="RCB">RCB</option>
                    <option value="PBKS">PUNJAB</option>
                    <option value="MI">MUMBAI</option>
                    <option value="GT">GUJARAT</option>
                    <option value="DC">DELHI</option>
                    <option value="SRH">HYDERABAD</option>
                    <option value="LSG">LUCKNOW</option>
                    <option value="KKR">KOLKATA</option>
                    <option value="RR">RAJASTHAN</option>
                    <option value="CSK">CHENNAI</option>
                </select>
                <select id="price-filter" class="bg-slate-800 border border-slate-700 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">All Prices</option>
                </select>
            </div>

            <!-- Player Table -->
            <div class="bg-slate-800/30 border border-slate-700 rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/80 text-slate-400 text-xs font-bold uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">Player</th>
                            <th class="px-6 py-4">Team</th>
                            <th class="px-6 py-4">Price</th>
                            <th class="px-6 py-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="player-table-body" class="text-sm">
                        <!-- JS injected -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-slate-800 border border-blue-500 rounded-2xl max-w-md w-full p-8 text-center">
            <div class="w-20 h-20 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 badge-pulse">
                <i class="fas fa-check text-4xl text-white"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">Squad Complete!</h3>
            <p class="text-slate-400 mb-6">Your team is ready for the tournament.</p>
            <div class="bg-slate-900 rounded-lg p-4 mb-6">
                <p class="text-xs text-slate-500 uppercase font-bold">Total Spend</p>
                <p id="final-cost" class="text-3xl font-mono font-bold text-blue-400">99.5</p>
            </div>
            <button onclick="location.reload()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition-colors">
                Build Another Team

        </div>
    </div>

        const TEAMS = ["RCB", "PBKS", "MI", "GT", "DC", "SRH", "LSG", "KKR", "RR", "CSK"];

        // Application State
        let selectedPlayers = [];
        let budgetUsed = 0;
        const BUDGET_LIMIT = 100;
        const SQUAD_SIZE = 11;

        // DOM Elements
        const playerTableBody = document.getElementById('player-table-body');
        const selectedList = document.getElementById('selected-list');
        const budgetLeftEl = document.getElementById('budget-left');
        const playerCountEl = document.getElementById('player-count');
        const teamCountEl = document.getElementById('team-count');
        const searchInput = document.getElementById('player-search');
        const teamFilter = document.getElementById('team-filter');
        const priceFilter = document.getElementById('price-filter');
        const budgetProgress = document.getElementById('budget-progress');
        const submitBtn = document.getElementById('submit-btn');
        const validationBox = document.getElementById('validation-errors');
        const squadStatus = document.getElementById('squad-status');

        // Initialize Table
        function renderPlayers() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterTeam = teamFilter.value;
            const filterPrice = priceFilter.value;

            const filtered = PLAYER_DB.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm) || p.team.toLowerCase().includes(searchTerm) || p.price.toString().includes(searchTerm);
                const matchesTeam = filterTeam === 'all' || p.team === filterTeam;
                const matchesPrice = filterPrice === 'all' || p.price == filterPrice;
                return matchesSearch && matchesTeam && matchesPrice;
            });

            playerTableBody.innerHTML = filtered.map(p => {
                const isSelected = selectedPlayers.some(sp => sp.id === p.id);
                return `
                    <tr class="player-row transition-colors ${isSelected ? 'selected-row' : ''}">
                        <td class="px-6 py-4 font-mono text-slate-500">#${p.id.toString().padStart(3, '0')}</td>
                        <td class="px-6 py-4 font-medium text-white">${p.name}</td>
                        <td class="px-6 py-4">
                            <span class="${p.color} px-2 py-1 rounded text-[10px] font-bold text-white shadow-sm">
                                ${p.team}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-mono font-bold text-blue-400">${p.price}</td>
                        <td class="px-6 py-4 text-center">
                            <button 
                                onclick="togglePlayer(${p.id})"
                                class="w-8 h-8 rounded-full flex items-center justify-center transition-all ${isSelected ? 'bg-red-500/20 text-red-500 border border-red-500' : 'bg-blue-600/20 text-blue-500 border border-blue-600 hover:bg-blue-600 hover:text-white'}"
                            >
                                <i class="fas ${isSelected ? 'fa-minus' : 'fa-plus'}"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function togglePlayer(id) {
            const player = PLAYER_DB.find(p => p.id === id);
            const index = selectedPlayers.findIndex(p => p.id === id);

            if (index > -1) {
                // Remove
                selectedPlayers.splice(index, 1);
            } else {
                // Validation before adding
                if (selectedPlayers.length >= SQUAD_SIZE) {
                    showError("Squad is full (11 players max).");
                    return;
                }
                const currentBudget = selectedPlayers.reduce((sum, p) => sum + p.price, 0);
                if (currentBudget + player.price > BUDGET_LIMIT) {
                    showError(`Cannot afford ${player.name}. Budget exceeded!`);
                    return;
                }

                // Team rule: Max 2 from any team
                const teamCount = selectedPlayers.filter(p => p.team === player.team).length;
                if (teamCount >= 2) {
                    showError(`You already have 2 players from ${player.team}.`);
                    return;
                }

                selectedPlayers.push(player);
            }

            updateUI();
            renderPlayers();
        }

        function updateUI() {
            budgetUsed = selectedPlayers.reduce((sum, p) => sum + p.price, 0);
            budgetLeft = BUDGET_LIMIT - budgetUsed;
            const uniqueTeams = new Set(selectedPlayers.map(p => p.team));
            
            // Updates Top Bar
            budgetLeftEl.textContent = `${budgetLeft.toFixed(0)} / 100`;
            playerCountEl.textContent = `${selectedPlayers.length} / 11`;
            teamCountEl.textContent = `${uniqueTeams.size} / 10`;
            
            // Progress Bar
            const budgetPerc = (budgetUsed / BUDGET_LIMIT) * 100;
            budgetProgress.style.width = `${budgetPerc}%`;
            budgetProgress.className = `h-full transition-all duration-500 ${budgetPerc > 90 ? 'bg-red-500' : budgetPerc > 75 ? 'bg-amber-500' : 'bg-blue-500'}`;

            // Render Selected List
            if (selectedPlayers.length === 0) {
                selectedList.innerHTML = `<p class="text-slate-500 text-center py-10 italic">No players selected yet...</p>`;
            } else {
                selectedList.innerHTML = selectedPlayers.map(p => `
                    <div class="flex items-center justify-between bg-slate-700/50 p-3 rounded-lg border border-slate-600/50">
                        <div class="flex items-center gap-3">
                            <span class="${p.color} w-2 h-8 rounded-full"></span>
                            <div>
                                <p class="text-sm font-bold text-white leading-none">${p.name}</p>
                                <p class="text-[10px] text-slate-400 mt-1">${p.team} • Price: ${p.price}</p>
                            </div>
                        </div>
                        <button onclick="togglePlayer(${p.id})" class="text-slate-400 hover:text-red-500 transition-colors">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `).join('');
            }

            validateSquad();
        }

        function validateSquad() {
            const errors = [];
            const uniqueTeams = new Set(selectedPlayers.map(p => p.team));
            
            if (selectedPlayers.length < 11) errors.push(`Need ${11 - selectedPlayers.length} more players.`);
            if (uniqueTeams.size < 10) errors.push(`Need players from ${10 - uniqueTeams.size} more teams.`);

            if (errors.length > 0) {
                validationBox.classList.remove('hidden');
                validationBox.querySelector('p').innerHTML = errors.join('<br>');
                submitBtn.disabled = true;
                submitBtn.className = "w-full mt-6 py-3 rounded-lg bg-slate-700 text-slate-500 font-bold cursor-not-allowed transition-all";
                squadStatus.textContent = "Incomplete";
                squadStatus.className = "text-[10px] bg-slate-700 px-2 py-1 rounded text-slate-300";
            } else {
                validationBox.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.className = "w-full mt-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-bold cursor-pointer transition-all shadow-lg shadow-blue-500/20";
                squadStatus.textContent = "Ready";
                squadStatus.className = "text-[10px] bg-emerald-500/20 px-2 py-1 rounded text-emerald-400";
            }
        }

        function showError(msg) {
            // Simple toast alternative
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl z-[200] animate-bounce";
            toast.innerHTML = `<i class="fas fa-triangle-exclamation mr-2"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Finalize Logic
        submitBtn.addEventListener('click', () => {
            if (submitBtn.disabled) return;
            document.getElementById('final-cost').textContent = budgetUsed.toFixed(1);
            document.getElementById('success-modal').classList.remove('hidden');
        });

        // Search/Filter Listeners
        searchInput.addEventListener('input', renderPlayers);
        teamFilter.addEventListener('change', renderPlayers);
        priceFilter.addEventListener('change', renderPlayers);

        // Responsive Sidebar
        document.getElementById('view-squad-btn').addEventListener('click', () => {
            const sidebar = document.getElementById('squad-sidebar');
            sidebar.scrollIntoView({ behavior: 'smooth' });
            sidebar.classList.add('ring-4', 'ring-blue-500/30');
            setTimeout(() => sidebar.classList.remove('ring-4', 'ring-blue-500/30'), 2000);
        });

        // Init
        const prices = [...new Set(PLAYER_DB.map(p => p.price))].sort((a, b) => a - b);
        prices.forEach(price => {
            const option = document.createElement('option');
            option.value = price;
            option.textContent = price;
            priceFilter.appendChild(option);
        });
        renderPlayers();
    </script>
</body>
</html>
